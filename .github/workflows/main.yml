name: Odoo Stock Report Automation

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: 'Select script to run manually'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - Order_realsed.py
          - Production_data_fetch.py
          - Fg_delivery.py
          - PI_data.py
          - LC_recv.py
          - production_dashboard.py
          - slider_wise_order_realsed.py
          - buyer_wise_production_pending.py
          - buyer_wise_pi_pending.py
      from_date:
        description: 'From date (YYYY-MM-DD HH:MM:SS or YYYY-MM-DD)'
        required: false
        default: ''
      to_date:
        description: 'To date (YYYY-MM-DD HH:MM:SS or YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  run-odoo-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode Google creds
        run: echo "${{ secrets.GOOGLE_CREDS_JSON }}" | base64 --decode > gcreds.json

      - name: Run Order Released script
        if: ${{ github.event.inputs.script_name == 'Order_realsed.py' || github.event.inputs.script_name == 'ALL' }}
        run: python Order_realsed.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run Production Data Fetch script
        if: ${{ github.event.inputs.script_name == 'Production_data_fetch.py' || github.event.inputs.script_name == 'ALL' }}
        run: python Production_data_fetch.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run FG Delivery script
        if: ${{ github.event.inputs.script_name == 'Fg_delivery.py' || github.event.inputs.script_name == 'ALL' }}
        run: python Fg_delivery.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run PI_data script
        if: ${{ github.event.inputs.script_name == 'PI_data.py' || github.event.inputs.script_name == 'ALL' }}
        run: python PI_data.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run LC_recv script
        if: ${{ github.event.inputs.script_name == 'LC_recv.py' || github.event.inputs.script_name == 'ALL' }}
        run: python LC_recv.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run production_dashboard script
        if: ${{ github.event.inputs.script_name == 'production_dashboard.py' || github.event.inputs.script_name == 'ALL' }}
        run: python production_dashboard.py
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run slider_wise_order_realsed
        if: ${{ github.event.inputs.script_name == 'slider_wise_order_realsed.py' || github.event.inputs.script_name == 'ALL' }}
        run: python slider_wise_order_realsed.py
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run buyer_wise_production_pending script
        if: ${{ github.event.inputs.script_name == 'buyer_wise_production_pending.py' || github.event.inputs.script_name == 'ALL' }}
        run: python buyer_wise_production_pending.py --from_date "${{ github.event.inputs.from_date }}" --to_date "${{ github.event.inputs.to_date }}"
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}

      - name: Run buyer_wise_pi_pending script
        if: ${{ github.event.inputs.script_name == 'buyer_wise_pi_pending.py' || github.event.inputs.script_name == 'ALL' }}
        run: python buyer_wise_pi_pending.py
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
